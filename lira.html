<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIRAa</title>
    <link rel="icon" href="data:,">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* Estilos CSS do seu projeto */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-color: #1a1a2e;
            --primary-color: #00b4d8;
            --secondary-color: #89b4f0;
            --text-color: #e0e0e0;
            --card-bg: #21213e;
            --border-color: #3e4a61;
            --input-bg: #111122;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            padding: 10px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 15px;
        }

        .box {
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
        }
        
        .box h1, .box h3 {
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 1.3em;
            font-weight: 700;
            color: var(--secondary-color);
            text-shadow: 0 0 3px var(--secondary-color);
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
        }

        .select-bairro, .select-filtro {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            background-color: var(--input-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
        }

        .oculto {
            display: none;
        }

        .resultados-liraa p, .resultados-estatisticos p {
            margin-bottom: 10px;
        }
        
        .resultados-liraa strong, .resultados-estatisticos strong {
            color: var(--primary-color);
        }

        /* Novo estilo para as estatísticas - layout em 2 colunas */
        .grid-estatisticas {
            display: grid;
            grid-template-columns: 1fr; /* Padrão 1 coluna */
            gap: 15px;
        }
        .grid-estatisticas > div {
            background-color: var(--input-bg);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }
        /* Responsivo para telas maiores - 2 colunas */
        @media (min-width: 600px) {
            .grid-estatisticas {
                grid-template-columns: 1fr 1fr; 
            }
        }
        
    </style>
</head>
<body>
    <div class="container">
        <div class="box">
            <h1>Dados LIRAa</h1>
            
            <label for="selecaoBairro">Selecione o Bairro:</label>
            <select id="selecaoBairro" class="select-bairro"></select>
            
            <div id="estatisticasContainer" class="oculto box">
                <h3>Metas e Estatísticas do Bairro</h3>
                <div id="resultadosEstatisticos" class="grid-estatisticas">
                    </div>
            </div>

            <label for="selecaoFiltro" id="labelFiltro" class="oculto">Selecione o Tipo de LIRAa:</label>
            <select id="selecaoFiltro" class="select-filtro oculto">
                <option value="">Selecione um filtro</option>
                <option value="LIRA 1">LIRA 1</option>
                <option value="LIRA 2">LIRA 2</option>
                <option value="LIRA 3">LIRA 3</option>
                <option value="LIRA 4">LIRA 4</option>
            </select>
            
            <div id="resultadosContainer" class="oculto box">
                <h3>Resumo de Resultados LIRAa</h3>
                <div id="resultadosLiraa" class="resultados-liraa"></div>
            </div>
        </div>
    </div>

    <script>
        // URLs dos arquivos
        const urlLIRAa = 'LIRAa 2025.json';
        const urlEstatisticas = 'bairros_4ciclo_2025.json';

        // Elementos da página
        const selecaoBairro = document.getElementById('selecaoBairro');
        const selecaoFiltro = document.getElementById('selecaoFiltro');
        const labelFiltro = document.getElementById('labelFiltro');
        const resultadosContainer = document.getElementById('resultadosContainer');
        const resultadosLiraa = document.getElementById('resultadosLiraa');
        const estatisticasContainer = document.getElementById('estatisticasContainer');
        const resultadosEstatisticos = document.getElementById('resultadosEstatisticos');

        // Variáveis de dados
        let dadosLIRAa = [];
        let dadosEstatisticos = [];

        async function carregarDadosIniciais() {
            try {
                // Carregar ambos os arquivos JSON em paralelo
                const [responseLIRAa, responseEstatisticas] = await Promise.all([
                    fetch(urlLIRAa),
                    fetch(urlEstatisticas)
                ]);

                if (!responseLIRAa.ok) throw new Error(`Erro ao carregar LIRAa: ${responseLIRAa.statusText}`);
                if (!responseEstatisticas.ok) throw new Error(`Erro ao carregar Estatísticas: ${responseEstatisticas.statusText}`);

                dadosLIRAa = await responseLIRAa.json();
                dadosEstatisticos = await responseEstatisticas.json();

                // Usar dados LIRAa para popular o filtro de bairros (pode usar o de estatísticas também)
                const bairrosUnicos = new Set();
                dadosLIRAa.forEach(item => {
                    if (item['BAIRRO']) {
                        bairrosUnicos.add(item['BAIRRO'].trim());
                    }
                });

                const defaultOption = document.createElement('option');
                defaultOption.textContent = 'Selecione um bairro';
                defaultOption.value = '';
                selecaoBairro.appendChild(defaultOption);

                Array.from(bairrosUnicos).sort().forEach(bairro => {
                    const option = document.createElement('option');
                    option.textContent = bairro;
                    option.value = bairro;
                    selecaoBairro.appendChild(option);
                });

            } catch (error) {
                console.error('Erro ao buscar JSONs:', error);
                const option = document.createElement('option');
                option.textContent = 'Erro ao carregar dados';
                selecaoBairro.appendChild(option);
            }
        }

        // NOVO: Função para exibir as estatísticas (4 linhas)
        function exibirEstatisticas(bairroSelecionado) {
            resultadosEstatisticos.innerHTML = '';
            estatisticasContainer.classList.add('oculto');
            
            if (!bairroSelecionado) return;

            // Encontra a primeira (e única, presumivelmente) entrada para o bairro no JSON de estatísticas
            const dadosDoBairro = dadosEstatisticos.find(item => 
                item['BAIRRO'].trim() === bairroSelecionado
            );

            if (!dadosDoBairro) {
                resultadosEstatisticos.innerHTML = '<p>Nenhuma estatística encontrada para este bairro.</p>';
                estatisticasContainer.classList.remove('oculto');
                return;
            }

            // Mapeamento das chaves do JSON para os rótulos solicitados
            const chavesMapeadas = [
                { rotulo: "Total de Imóveis / Estrato", chave: "total_imoveis_por_estrato" },
                { rotulo: "Total de Quarteirões / Estrato", chave: "total_quarteiroes_por_estrato" },
                { rotulo: "Total de Imóveis à Inspecionar", chave: "total_imoveis_a_inspecionar" },
                { rotulo: "Total de Quarteirões Sorteados", chave: "total_quarteiroes_sorteados" }
            ];

            let htmlEstatisticas = '';
            chavesMapeadas.forEach(item => {
                const valor = dadosDoBairro[item.chave] || 'N/A'; // Usa N/A se a chave não existir
                htmlEstatisticas += `
                    <div>
                        <p><strong>${item.rotulo}:</strong></p>
                        <p>${valor}</p>
                    </div>
                `;
            });

            resultadosEstatisticos.innerHTML = htmlEstatisticas;
            estatisticasContainer.classList.remove('oculto');
        }


        // Função existente para filtro LIRAa (mantida)
        function exibirResultadosLIRAa(bairroSelecionado, filtroSelecionado) {
            resultadosLiraa.innerHTML = '';
            resultadosContainer.classList.add('oculto');
            
            if (!bairroSelecionado || !filtroSelecionado) {
                return;
            }

            const dadosFiltrados = dadosLIRAa.filter(item => 
                item['BAIRRO'].trim() === bairroSelecionado
            );
            
            let resultadoTexto = '';
            let totalRegistros = 0;
            let iipValueExibido = null;

            const numeroLira = filtroSelecionado.split(' ')[1];
            const LIRAaQtKey = `${filtroSelecionado} QT`;
            const IIPLIRAaKey = `IIP ${numeroLira} LIRAa `;

            dadosFiltrados.forEach(item => {
                const qtValue = item[LIRAaQtKey];
                
                if (qtValue !== undefined && qtValue !== "0") {
                    if (iipValueExibido === null) {
                        iipValueExibido = item[IIPLIRAaKey];
                    }
                    totalRegistros++;
                    resultadoTexto += `<p>${qtValue}</p>`;
                }
            });

            if (totalRegistros === 0) {
                 resultadosLiraa.innerHTML = `<p>Nenhum registro de ${filtroSelecionado} encontrado neste bairro.</p>`;
            } else {
                let htmlFinal = `
                    <p><strong>BAIRRO:</strong> ${bairroSelecionado}</p>
                    <p><strong>IIP LIRAa:</strong> ${iipValueExibido}</p>
                    <p><strong>Total de Quarteirões:</strong> ${totalRegistros}</p>
                    <hr style="border-color: var(--border-color); margin: 15px 0;">
                    <p><strong>Quarteirões por Tipo (${filtroSelecionado}):</strong></p>
                    ${resultadoTexto}
                `;
                resultadosLiraa.innerHTML = htmlFinal;
            }

            resultadosContainer.classList.remove('oculto');
        }

        selecaoBairro.addEventListener('change', (event) => {
            const bairroSelecionado = event.target.value;
            
            // 1. Esconder tudo se nenhum bairro for selecionado
            if (!bairroSelecionado) {
                labelFiltro.classList.add('oculto');
                selecaoFiltro.classList.add('oculto');
                resultadosContainer.classList.add('oculto');
                estatisticasContainer.classList.add('oculto');
                return;
            }
            
            // 2. Exibir o filtro LIRAa
            labelFiltro.classList.remove('oculto');
            selecaoFiltro.classList.remove('oculto');
            selecaoFiltro.value = ''; // Limpa a seleção do filtro
            resultadosLiraa.innerHTML = '';
            resultadosContainer.classList.add('oculto');
            
            // 3. Exibir as Estatísticas
            exibirEstatisticas(bairroSelecionado);
        });

        selecaoFiltro.addEventListener('change', (event) => {
            const bairroSelecionado = selecaoBairro.value;
            const filtroSelecionado = event.target.value;
            if (bairroSelecionado && filtroSelecionado) {
                // Chama a função LIRAa, que é a mais detalhada
                exibirResultadosLIRAa(bairroSelecionado, filtroSelecionado);
            } else {
                resultadosContainer.classList.add('oculto');
            }
        });

        document.addEventListener('DOMContentLoaded', carregarDadosIniciais);
    </script>
</body>
</html>
