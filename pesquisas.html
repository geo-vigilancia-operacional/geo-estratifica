<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesquisas e Estatísticas</title>
    <link rel="icon" href="data:,">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* Estilos CSS (mantidos) */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-color: #1a1a2e;
            --primary-color: #00b4d8;
            --secondary-color: #89b4f0;
            --text-color: #e0e0e0;
            --card-bg: #21213e;
            --border-color: #3e4a61;
            --input-bg: #111122;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            padding: 10px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 15px;
        }

        .box {
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
        }
        
        .box h1, .box h3 {
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 1.3em;
            font-weight: 700;
            color: var(--secondary-color);
            text-shadow: 0 0 3px var(--secondary-color);
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
        }
        
        .select-personalizado, .input-personalizado {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            background-color: var(--input-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
        }

        #quadrasContainer {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
        }

        .quadra-bloco {
            background-color: #2a2a47; 
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .quadra-bloco h4 {
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        .quadra-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }

        .quadra-inputs label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9em;
        }

        #resultadoContagem {
            margin-top: 15px;
            padding: 15px;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 1.0em;
            font-weight: 700;
        }
        #resultadoContagem strong {
            color: var(--primary-color);
        }

        .resultado-total {
            font-size: 1.2em;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px dashed var(--border-color);
        }

        .grid-estatisticas {
            display: grid;
            grid-template-columns: 1fr; 
            gap: 15px;
            margin-bottom: 20px;
        }
        .grid-estatisticas > div {
            background-color: var(--input-bg);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }
        .grid-estatisticas p {
            margin: 0;
        }
        .grid-estatisticas strong {
            color: var(--primary-color);
        }
        @media (min-width: 600px) {
            .grid-estatisticas {
                grid-template-columns: 1fr 1fr; 
            }
        }
        
    </style>
</head>
<body>
    <div class="container">
        <div class="box">
            <h1>Pesquisas e Estatísticas</h1>
            
            <div id="estatisticasContainer" class="box" style="margin-bottom: 0;">
                <h3 id="tituloEstatisticas">Total Geral de Pesquisados</h3>
                
                <div id="resultadosEstatisticos" class="grid-estatisticas">
                    <div>
                        <p><strong>Total de Imóveis / Estrato:</strong></p>
                        <p id="imoveisEstrato">--</p>
                    </div>
                    <div>
                        <p><strong>Total de Quarteirões / Estrato:</strong></p>
                        <p id="quarteiroesEstrato">--</p>
                    </div>
                    <div>
                        <p><strong>Total de Imóveis à Inspecionar:</strong></p>
                        <p id="imoveisInspecionar">--</p>
                    </div>
                    <div>
                        <p><strong>Total de Quarteirões Sorteados:</strong></p>
                        <p id="quarteiroesSorteados">--</p>
                    </div>
                </div>

                <hr style="border-color: var(--border-color); margin-bottom: 20px;">

                <p id="bairroSelecionadoDisplay" style="font-size: 1.1em; margin-bottom: 15px;">Selecione um código para filtrar por bairro.</p>
                
                <label for="selecaoCodigo">Selecione o Código:</label>
                <select id="selecaoCodigo" class="select-personalizado"></select>

                <div id="quadrasContainer">
                    </div>

                <div id="resultadoContagem" style="display: none;"></div>
            </div>
        </div>
    </div>
    
    <script>
        const urlEstatisticas = 'bairros_4ciclo_2025.json';
        
        // Elementos do DOM (mantidos)
        const selecaoCodigo = document.getElementById('selecaoCodigo');
        const bairroDisplay = document.getElementById('bairroSelecionadoDisplay');
        const tituloEstatisticas = document.getElementById('tituloEstatisticas');
        const quadrasContainer = document.getElementById('quadrasContainer'); 
        const resultadoContagem = document.getElementById('resultadoContagem'); 
        
        const imoveisEstrato = document.getElementById('imoveisEstrato');
        const quarteiroesEstrato = document.getElementById('quarteiroesEstrato');
        const imoveisInspecionar = document.getElementById('imoveisInspecionar');
        const quarteiroesSorteados = document.getElementById('quarteiroesSorteados');
        
        let dadosEstatisticos = []; // Contém todos os registros de quadra do JSON
        let bairrosAtuais = []; // Guarda os objetos {bairro, inicio, fim} para o código selecionado
        
        // Mapeamento de Chaves JSON para o Display
        // 💡 NOTA: Agora o JSON é uma lista de quadras. As métricas do cabeçalho
        // (imóveis/estrato, etc.) terão que ser somadas de TODOS os registros (quadras)
        // do bairro.
        const METRICAS = {
            imoveisEstrato: 'TOTAL', // TOTAL é o Imóvel por Quadra, somaremos todos.
            quarteiroesEstrato: 'QT', // QT é o número da Quadra. Contaremos quantas são.
            imoveisInspecionar: 'R',
            quarteiroesSorteados: 'C' 
        };
        
        // 💡 CHAVES CRUCIAIS PARA O FILTRO
        const CHAVE_QUADRA = 'QT'; // Chave que contém o número da quadra para filtro
        const CHAVE_IMOVEIS_QUADRA = 'TOTAL'; // Chave que contém o total de imóveis para soma

        // Mapeamento de Códigos para Bairros e Intervalos de Quadras (mantido)
        const CODIGOS_BAIRROS = {
            '85': [{bairro: 'PARQUE DOIS IRMAOS', inicio: '1', fim: '180'}],
            '86': [{bairro: 'PARQUE DOIS IRMAOS', inicio: '181', fim: '278'}, {bairro: 'PASSARÉ', inicio: '1', fim: '93/1'}],
            '87': [{bairro: 'PASSARÉ', inicio: '94', fim: '236'}],
            '88': [{bairro: 'PASSARÉ', inicio: '237', fim: '413'}],
            '89': [{bairro: 'BOA VISTA', inicio: '1', fim: '59'}, {bairro: 'DIAS MACEDO', inicio: '1', fim: '73'}],
            '90': [{bairro: 'BOA VISTA', inicio: '60', fim: '104'}, {bairro: 'CAJAZEIRAS', inicio: '1', fim: '107'}],
            '91': [{bairro: 'BARROSO', inicio: '163', fim: '318'}],
            '92': [{bairro: 'BARROSO', inicio: '1', fim: '162'}],
            '93': [{bairro: 'JANGURUSSU', inicio: '1', fim: '69'}, {bairro: 'CONJUNTO PALMEIRAS', inicio: '1', fim: '116'}],
            '94': [{bairro: 'CONJUNTO PALMEIRAS', inicio: '117', fim: '245'}],
            '95': [{bairro: 'JANGURUSSU', inicio: '70', fim: '195'}],
            '96': [{bairro: 'JANGURUSSU', inicio: '196', fim: '366'}],
            '97': [{bairro: 'JANGURUSSU', inicio: '368', fim: '565'}],
            '98': [{bairro: 'PEDRAS', inicio: '1', fim: '90/3'}, {bairro: 'ANCURI', inicio: '1', fim: '90'}],
            '99': [{bairro: 'PARQUE SANTA MARIA', inicio: '1', fim: '88'}, {bairro: 'PAUPINA', inicio: '1', fim: '19'}],
           '100': [{bairro: 'PAUPINA', inicio: '20', fim: '116'}, {bairro: 'SÃO BENTO', inicio: '1', fim: '24'}],
           '101': [{bairro: 'SÃO BENTO', inicio: '25', fim: '151'}, {bairro: 'COAÇU', inicio: '1', fim: '64'}, {bairro: 'GUAJERU', inicio: '1', fim: '60'}],
           '102': [{bairro: 'MESSEJANA', inicio: '1', fim: '196'}],
           '103': [{bairro: 'MESSEJANA', inicio: '197', fim: '343'}],
           '104': [{bairro: 'CURIÓ', inicio: '1', fim: '48'}, {bairro: 'JOSE DE ALENCAR', inicio: '1', fim: '163'}],
           '105': [{bairro: 'LAGOA REDONDA', inicio: '1', fim: '132'}],
           '106': [{bairro: 'LAGOA REDONDA', inicio: '132/1', fim: '204'}, {bairro: 'SABIAGUABA', inicio: '1', fim: '82'}],
           '107': [{bairro: 'EDSON QUEIROZ', inicio: '1', fim: '62'}, {bairro: 'SAPIRANGA COITÉ', inicio: '206', fim: '304'}],
           '108': [{bairro: 'EDSON QUEIROZ', inicio: '65', fim: '284'}],
           '109': [{bairro: 'SAPIRANGA COITÉ', inicio: '1', fim: '205'}],
           '110': [{bairro: 'CAMBEBA', inicio: '1', fim: '72'}, {bairro: 'PARQUE IRACEMA', inicio: '1', fim: '46'}, {bairro: 'PARQUE MANIBURA', inicio: '1', fim: '87'}, {bairro: 'CIDADE DOS FUNCIONÁRIOS', inicio: '143', fim: '162'}],
           '111': [{bairro: 'AEROLÂNDIA', inicio: '57', fim: '81'}, {bairro: 'CIDADE DOS FUNCIONÁRIOS', inicio: '1', fim: '142/1'}, {bairro: 'JARDIM DAS OLIVEIRAS', inicio: '1', fim: '30'}],
           '112': [{bairro: 'JARDIM DAS OLIVEIRAS', inicio: '31', fim: '213'}],
           '113': [{bairro: 'AEROLÂNDIA', inicio: '1', fim: '56'}, {bairro: 'ALTO DA BALANÇA', inicio: '1', fim: '90'}]
        };

        // Função: NORMALIZAÇÃO ROBUSTA DE STRINGS (mantida)
        function normalizarString(str) {
            if (typeof str !== 'string') return '';
            return str
                .normalize('NFD')
                .replace(/[\u0300-\u036f]/g, "")
                .replace(/[^a-zA-Z0-9\s/]/g, "") // Mantive o '/' para permitir números como '93/1'
                .replace(/\s+/g, ' ')
                .trim()
                .toUpperCase();
        }

        // Função para carregar o JSON (mantida)
        async function carregarDados() {
            try {
                const resEstatisticas = await fetch(urlEstatisticas);

                if (!resEstatisticas.ok) throw new Error(`Erro ao carregar Estatísticas (${urlEstatisticas}): ${resEstatisticas.statusText}`);
                
                dadosEstatisticos = await resEstatisticas.json();
            } catch (error) {
                console.error('Erro fatal ao buscar arquivo JSON:', error);
            }
        }
        
        // Função para popular a caixa de seleção (mantida)
        function popularSeletor() {
            const defaultOption = document.createElement('option');
            defaultOption.textContent = 'Selecione um código';
            defaultOption.value = '';
            selecaoCodigo.appendChild(defaultOption);

            for (let i = 85; i <= 113; i++) {
                const codigo = String(i);
                const nomesBairros = CODIGOS_BAIRROS[codigo] ? CODIGOS_BAIRROS[codigo].map(item => item.bairro) : [];
                const nomeDisplay = nomesBairros.length > 0 ? nomesBairros.join(', ') : 'Bairro(s) Desconhecido(s)';

                const option = document.createElement('option');
                option.textContent = `${codigo} - ${nomeDisplay}`; 
                option.value = codigo;
                selecaoCodigo.appendChild(option);
            }
        }
        
        // 💡 NOVA FUNÇÃO: Compara quadras, tratando '93/1' como 93.1, ou seja, numérico.
        function compararQuadras(quadraItem, inicio, fim) {
            // Função para converter strings como '93/1' para um número (93.1) para comparação
            const parseQuadra = (q_str) => {
                const parts = String(q_str).split('/');
                let num = parseFloat(parts[0]);
                
                // Se houver uma segunda parte (ex: /1, /2), adiciona como decimal para ordenação
                if (parts.length > 1) {
                    const decimal = parseFloat(parts[1]) / 100; // Divide por 100 para ser um decimal pequeno (ex: 93.01)
                    num += decimal;
                }
                return num;
            };

            const q_num = parseQuadra(quadraItem);
            const i_num = parseQuadra(inicio);
            const f_num = parseQuadra(fim);
            
            // Verifica se a quadra está dentro do intervalo
            return q_num >= i_num && q_num <= f_num;
        }

        // Função para gerar campos (mantida)
        function gerarSelecaoQuadras(bairrosComIntervalo) {
            quadrasContainer.innerHTML = ''; 
            resultadoContagem.style.display = 'none'; 
            
            if (bairrosComIntervalo.length === 0) {
                quadrasContainer.innerHTML += '<p>Nenhum bairro com intervalo definido para este código.</p>';
                return;
            }
            
            quadrasContainer.innerHTML += '<h4>Intervalo de Quadras Padrão (Edite se necessário):</h4>';

            bairrosComIntervalo.forEach(item => {
                const nomeBairroClean = String(item.bairro).trim();
                const idPrefix = normalizarString(nomeBairroClean).replace(/\s/g, '_'); 

                const blocoHtml = `
                    <div class="quadra-bloco" data-bairro="${nomeBairroClean}">
                        <h4>${nomeBairroClean}</h4>
                        <div class="quadra-inputs">
                            <div>
                                <label for="${idPrefix}_inicio">Quadra Inicial (QT):</label>
                                <input type="text" id="${idPrefix}_inicio" class="input-personalizado quadra-input-inicio" 
                                       placeholder="Ex: 1" data-bairro-id="${idPrefix}" value="${item.inicio}">
                            </div>
                            <div>
                                <label for="${idPrefix}_fim">Quadra Final (QT):</label>
                                <input type="text" id="${idPrefix}_fim" class="input-personalizado quadra-input-fim" 
                                       placeholder="Ex: 180" data-bairro-id="${idPrefix}" value="${item.fim}">
                            </div>
                        </div>
                    </div>
                `;
                quadrasContainer.innerHTML += blocoHtml;
            });
            
            // Adiciona o Event Listener para cálculo em todos os inputs
            const inputs = quadrasContainer.querySelectorAll('input[type="text"]');
            inputs.forEach(input => {
                input.addEventListener('input', calcularQuadrasUteis);
            });
            
            // Chama a função de cálculo imediatamente APÓS preencher os campos
            calcularQuadrasUteis();
        }

        // 💡 FUNÇÃO REATIVADA: Calcula Quadras e Imóveis filtrando por QT e usando TOTAL
        function calcularQuadrasUteis() {
            let totalQuadrasUteis = 0;
            let totalImoveisUteis = 0; 
            resultadoContagem.innerHTML = '';
            
            if (bairrosAtuais.length === 0 || dadosEstatisticos.length === 0) return;

            let resultadosHtml = '';
            let isAnyInputValid = false;

            // Filtra os registros do JSON por CÓDIGO/BAIRRO antes de iterar
            const bairrosParaFiltrarNormalizados = bairrosAtuais.map(item => normalizarString(item.bairro));
            const todosRegistrosDoCodigo = dadosEstatisticos.filter(item => {
                const nomeBairroItemNormalizado = normalizarString(item['BAIRRO']);
                return bairrosParaFiltrarNormalizados.includes(nomeBairroItemNormalizado);
            });

            // Itera sobre CADA BAIRRO no CÓDIGO
            bairrosAtuais.forEach(itemBairro => { 
                const nomeBairroClean = itemBairro.bairro;
                const idPrefix = normalizarString(nomeBairroClean).replace(/\s/g, '_');

                // Recupera os valores preenchidos (que podem ter sido alterados pelo usuário)
                const inputInicio = document.getElementById(`${idPrefix}_inicio`);
                const inputFim = document.getElementById(`${idPrefix}_fim`);

                const inicio = inputInicio ? inputInicio.value : '';
                const fim = inputFim ? inputFim.value : '';
                
                // Validação de inputs
                if (!inicio || !fim) {
                    return; 
                }
                
                isAnyInputValid = true; 

                // Aplica a normalização ao nome do bairro do JS
                const nomeBairroNormalizado = normalizarString(nomeBairroClean);

                // 1. Filtra os registros que pertencem ao bairro E estão dentro do intervalo QT
                const quadrasUteisBairro = todosRegistrosDoCodigo.filter(registro => {
                    const nomeItemNormalizado = normalizarString(registro['BAIRRO']); 
                    const quadra = registro[CHAVE_QUADRA]; // Pega o valor da QT
                    const imoveis = parseInt(registro[CHAVE_IMOVEIS_QUADRA]) || 0; // Pega o valor do TOTAL
                    
                    // Condições de filtro:
                    // 1. O nome do bairro normalizado deve corresponder
                    // 2. A quadra (QT) deve estar dentro do intervalo [inicio, fim]
                    // 3. O total de imóveis deve ser maior que 0 (para ser considerado útil)
                    return nomeItemNormalizado === nomeBairroNormalizado &&
                           compararQuadras(quadra, inicio, fim) && 
                           imoveis > 0;
                });
                
                // Contagem de quadras útil(is)
                const contagemBairro = quadrasUteisBairro.length;
                totalQuadrasUteis += contagemBairro;
                
                // Soma os imóveis (TOTAL) das quadras úteis encontradas
                const imoveisBairro = quadrasUteisBairro.reduce((sum, registro) => {
                    return sum + (parseInt(registro[CHAVE_IMOVEIS_QUADRA]) || 0); 
                }, 0);
                totalImoveisUteis += imoveisBairro;

                const formatarValor = (valor) => valor.toLocaleString('pt-BR');

                resultadosHtml += `<p>
                                       <strong>${nomeBairroClean} (QT ${inicio} a ${fim}):</strong> 
                                       ${formatarValor(contagemBairro)} quadra(s) útil(is). 
                                       <span style="color: var(--secondary-color);">(${formatarValor(imoveisBairro)} imóveis)</span>
                                   </p>`;
            });
            
            // Exibe o container de resultados
            if (isAnyInputValid) {
                resultadoContagem.innerHTML = `${resultadosHtml}
                                           <div class="resultado-total">
                                           <p><strong>TOTAL GERAL DE QUADRAS ÚTEIS:</strong> <strong style="font-size: 1.2em;">${totalQuadrasUteis.toLocaleString('pt-BR')}</strong></p>
                                           <p><strong>TOTAL GERAL DE IMÓVEIS (Intervalo):</strong> <strong style="font-size: 1.2em;">${totalImoveisUteis.toLocaleString('pt-BR')}</strong></p>
                                           </div>`;
                resultadoContagem.style.display = 'block';
            } else {
                 resultadoContagem.style.display = 'none';
            }
        }


        // Função principal de exibição (mantida)
        function exibirResultadosPorCodigo(codigoSelecionado) {
            // ... (Lógica de limpeza e validação inicial mantida) ...

            imoveisEstrato.textContent = '--';
            quarteiroesEstrato.textContent = '--';
            imoveisInspecionar.textContent = '--';
            quarteiroesSorteados.textContent = '--';
            bairroDisplay.textContent = 'Selecione um código para filtrar por bairro.';
            tituloEstatisticas.textContent = 'Total Geral de Pesquisados';
            quadrasContainer.innerHTML = '';
            resultadoContagem.style.display = 'none';
            bairrosAtuais = []; 

            if (!codigoSelecionado) {
                return;
            }

            const bairrosComIntervalo = CODIGOS_BAIRROS[codigoSelecionado];
            const nomesBairrosMapeados = bairrosComIntervalo ? bairrosComIntervalo.map(item => item.bairro) : [];
            const nomeDisplayBairros = nomesBairrosMapeados ? nomesBairrosMapeados.join(', ') : '';
            bairrosAtuais = bairrosComIntervalo; 

            if (!bairrosComIntervalo || bairrosComIntervalo.length === 0) {
                bairroDisplay.textContent = `Código ${codigoSelecionado} não mapeado para nenhum bairro ou intervalo.`;
                return;
            }
            
            // --- 1. Lógica de Consolidação de Estatísticas (SOMA TUDO) ---
            
            const bairrosParaFiltrarNormalizados = nomesBairrosMapeados.map(normalizarString);
            
            const registrosFiltradosPorCodigo = dadosEstatisticos.filter(item => {
                const nomeBairroItemNormalizado = normalizarString(item['BAIRRO']);
                return bairrosParaFiltrarNormalizados.includes(nomeBairroItemNormalizado);
            });

            if (registrosFiltradosPorCodigo.length > 0) {
                // A consolidação agora SOMA os valores de CADA QUADRA (registro)
                const totais = {
                    imoveisEstrato: 0, 
                    quarteiroesEstrato: 0, 
                    imoveisInspecionar: 0, 
                    quarteiroesSorteados: 0
                };
                
                // O total de quarteirões é apenas a contagem de registros ÚNICOS de QT
                // Usamos um Set para contar a quantidade de quadras únicas (não repetidas)
                const quadrasUnicas = new Set();
                
                registrosFiltradosPorCodigo.forEach(item => {
                    totais.imoveisEstrato += parseInt(item[METRICAS.imoveisEstrato]) || 0; // Soma TOTAL de Imóveis
                    totais.imoveisInspecionar += parseInt(item[METRICAS.imoveisInspecionar]) || 0; // Soma R
                    totais.quarteiroesSorteados += parseInt(item[METRICAS.quarteiroesSorteados]) || 0; // Soma C
                    
                    // Adiciona a quadra (QT) ao Set para contar apenas uma vez
                    quadrasUnicas.add(item[CHAVE_QUADRA]);
                });
                
                totais.quarteiroesEstrato = quadrasUnicas.size; // Total de quadras (QT) únicas
                
                bairroDisplay.innerHTML = `**Bairro(s) Selecionado(s):** ${nomeDisplayBairros}`;
                tituloEstatisticas.textContent = `Estatísticas Consolidadas (Cód: ${codigoSelecionado})`;
                
                const formatarValor = (valor) => {
                    const num = parseFloat(valor);
                    return isNaN(num) ? '--' : num.toLocaleString('pt-BR');
                };

                imoveisEstrato.textContent = formatarValor(totais['imoveisEstrato']);
                quarteiroesEstrato.textContent = formatarValor(totais['quarteiroesEstrato']);
                imoveisInspecionar.textContent = formatarValor(totais['imoveisInspecionar']);
                quarteiroesSorteados.textContent = formatarValor(totais['quarteiroesSorteados']);
            } else {
                bairroDisplay.textContent = `AVISO: Nenhum registro de estatística encontrado para os bairros (${nomeDisplayBairros}). Verifique o JSON ou o mapeamento de nomes.`;
            }

            // --- 2. Lógica de Geração dos Campos de Quadras ---
            gerarSelecaoQuadras(bairrosComIntervalo);
        }

        // Event Listeners (mantidos)
        selecaoCodigo.addEventListener('change', (event) => {
            exibirResultadosPorCodigo(event.target.value);
        });

        document.addEventListener('DOMContentLoaded', async () => {
            await carregarDados();
            popularSeletor();
            exibirResultadosPorCodigo(''); 
        });
    </script>
</body>
</html>
