<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dados de Ovitrampas</title>
    <link rel="stylesheet" href="caminho/para/seu/estilo.css">
    
    <style>
        /* Estilos adicionais para esta página, se necessário */
        .box {
            /* Copie os estilos da classe .box da sua página principal aqui */
            background-color: #2c2f33; /* Exemplo de cor de fundo escura */
            color: #ffffff; /* Exemplo de cor de texto clara */
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="box">
            <h1>Bairros de Ovitrampas</h1>
            <p>Buscando e mapeando os bairros do arquivo JSON...</p>
            <ul id="lista-bairros"></ul>
        </div>
    </div>

    <script>
        const urlDoJson = 'ACOMPANHAMENTO_OVITRAMPAS.json';
        const listaBairros = document.getElementById('lista-bairros');

        async function mapearBairros() {
            try {
                const response = await fetch(urlDoJson);
                const dados = await response.json();

                const bairrosUnicos = new Set();
                dados.forEach(item => {
                    if (item['BAIRRO ']) {
                        bairrosUnicos.add(item['BAIRRO '].trim());
                    }
                });

                bairrosUnicos.forEach(bairro => {
                    const li = document.createElement('li');
                    li.textContent = bairro;
                    listaBairros.appendChild(li);
                });

            } catch (error) {
                console.error('Erro ao buscar o JSON:', error);
                listaBairros.innerHTML = '<li>Erro ao carregar os bairros.</li>';
            }
        }

        document.addEventListener('DOMContentLoaded', mapearBairros);
    </script>

</body>
</html>
