<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dados de Ovitrampas</title>
    <style>
/* Estilos para ter a mesma aparência da sua página principal */
:root {
    --bg-color: #1a1a2e;
    --text-color: #e0e0e0;
    --card-bg: #21213e;
    --border-color: #3e4a61;
    --primary-color: #00b4d8;
    --warning-color: #ff9800; /* Laranja para a soma total */
}

body {
    font-family: sans-serif;
    background-color: var(--bg-color);
    color: var(--text-color);
    line-height: 1.6;
    padding: 10px;
}

.container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 15px;
}

.box {
    background: var(--card-bg);
    border-radius: 12px;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
    padding: 25px;
    margin-bottom: 20px;
    border: 1px solid var(--border-color);
}

.oculto {
    display: none;
}

.box select, .box .select-bairro {
    width: 100%;
    padding: 10px;
    margin-bottom: 15px;
    border: 1px solid var(--border-color);
    border-radius: 8px;
    font-size: 1em;
    background-color: #111122;
    color: var(--text-color);
    cursor: pointer;
}

.box h1 {
    color: var(--primary-color);
}

.box h3 {
    margin-top: 0;
    margin-bottom: 10px;
    font-size: 1.3em;
    font-weight: 700;
    color: var(--primary-color);
}

/* Estilo para a nova lista de checkboxes */
#semanasLista {
    margin-bottom: 15px;
    border: 1px solid var(--border-color);
    border-radius: 8px;
    padding: 15px;
    background-color: #111122;
}

.semana-item {
    display: block;
    margin-bottom: 8px;
    font-size: 1em;
}

.semana-item input[type="checkbox"] {
    margin-right: 10px;
}

/* Estilo para a área de resultados */
#resultados-container {
    margin-top: 20px;
    padding: 15px;
    background: #111122;
    border-radius: 8px;
    border: 1px solid var(--border-color);
}

.total-ovos {
    font-size: 1.2em;
    font-weight: bold;
    color: var(--warning-color);
    margin-top: 10px;
}
    </style>
</head>
<body>

    <div class="container">
        <div class="box">
            <h1>Dados de Ovitrampas</h1>
            
            <label for="selecaoBairro">Selecione o Bairro:</label>
            <select id="selecaoBairro" class="select-bairro"></select>
            
            <div id="semanasContainer" class="oculto">
                <label>Selecione a(s) Semana(s):</label>
                <div id="semanasLista"></div>
            </div>

            <div id="resultados-container" class="oculto">
                <h3>Resultados</h3>
                <div id="resultados"></div>
                <div id="somaTotal" class="total-ovos"></div>
            </div>
            
        </div>
    </div>

<script>
    const urlDoJson = 'ACOMPANHAMENTO_OVITRAMPAS.json';
    const selecaoBairro = document.getElementById('selecaoBairro');
    const semanasContainer = document.getElementById('semanasContainer');
    const semanasLista = document.getElementById('semanasLista');
    const resultadosContainer = document.getElementById('resultados-container');
    const resultadosDiv = document.getElementById('resultados');
    const somaTotalDiv = document.getElementById('somaTotal');

    let dadosCompletos = []; // Variável para guardar o JSON inteiro

    // Função para carregar o JSON e popular a lista de bairros
    async function carregarBairros() {
        try {
            const response = await fetch(urlDoJson);
            dadosCompletos = await response.json();

            const bairrosUnicos = new Set();
            dadosCompletos.forEach(item => {
                if (item['BAIRRO ']) {
                    bairrosUnicos.add(item['BAIRRO '].trim());
                }
            });

            const defaultOption = document.createElement('option');
            defaultOption.textContent = 'Selecione um bairro';
            defaultOption.value = '';
            selecaoBairro.appendChild(defaultOption);

            Array.from(bairrosUnicos).sort().forEach(bairro => {
                const option = document.createElement('option');
                option.textContent = bairro;
                option.value = bairro;
                selecaoBairro.appendChild(option);
            });

        } catch (error) {
            console.error('Erro ao buscar o JSON:', error);
            const option = document.createElement('option');
            option.textContent = 'Erro ao carregar dados';
            selecaoBairro.appendChild(option);
        }
    }

    // Função para popular as semanas com base no bairro selecionado
    function popularSemanas(bairroSelecionado) {
        semanasLista.innerHTML = '';
        
        const dadosDoBairro = dadosCompletos.filter(item => 
            item['BAIRRO '].trim() === bairroSelecionado
        );

        if (dadosDoBairro.length === 0) return;

        const semanas = new Set();
        dadosDoBairro.forEach(item => {
            for (const key in item) {
                if (key.startsWith('SEMANA ')) {
                    semanas.add(key.replace('SEMANA ', ''));
                }
            }
        });

        Array.from(semanas).sort((a, b) => parseInt(a) - parseInt(b)).forEach(semana => {
            const label = document.createElement('label');
            label.className = 'semana-item';
            
            // Calculamos a soma total para essa semana em todas as linhas do bairro
            let somaOvosSemana = 0;
            dadosDoBairro.forEach(item => {
                const valor = parseInt(item[`SEMANA ${semana}`]) || 0;
                somaOvosSemana += valor;
            });

            label.innerHTML = `<input type="checkbox" name="semanas" value="${semana}"> Semana ${semana}: ${somaOvosSemana} ovos`;
            semanasLista.appendChild(label);
        });
    }
    
    // Função para exibir os valores e a soma das semanas selecionadas
    function exibirResultados() {
        resultadosDiv.innerHTML = '';
        somaTotalDiv.innerHTML = '';

        const bairroSelecionado = selecaoBairro.value;
        if (!bairroSelecionado) return;

        const semanasSelecionadas = Array.from(document.querySelectorAll('#semanasLista input[type="checkbox"]:checked'));

        if (semanasSelecionadas.length === 0) {
            resultadosContainer.classList.add('oculto');
            return;
        }

        resultadosContainer.classList.remove('oculto');

        // Filtra para pegar todos os registros do bairro selecionado
        const dadosDoBairro = dadosCompletos.filter(item => 
            item['BAIRRO '].trim() === bairroSelecionado
        );
        
        let somaOvosTotal = 0;

        semanasSelecionadas.forEach(checkbox => {
            const semanaNumero = checkbox.value;
            const chaveSemana = `SEMANA ${semanaNumero}`;
            
            let somaOvosSemana = 0;
            dadosDoBairro.forEach(item => {
                const valor = parseInt(item[chaveSemana]) || 0;
                somaOvosSemana += valor;
            });

            somaOvosTotal += somaOvosSemana;

            const p = document.createElement('p');
            p.innerHTML = `<strong>Semana ${semanaNumero}:</strong> ${somaOvosSemana} ovos`;
            resultadosDiv.appendChild(p);
        });

        somaTotalDiv.innerHTML = `Soma Total: ${somaOvosTotal} ovos`;
    }

    // Eventos que escutam as mudanças
    selecaoBairro.addEventListener('change', (event) => {
        const bairroSelecionado = event.target.value;
        if (bairroSelecionado) {
            semanasContainer.classList.remove('oculto');
            popularSemanas(bairroSelecionado);
        } else {
            semanasContainer.classList.add('oculto');
        }
        resultadosContainer.classList.add('oculto');
    });

    semanasLista.addEventListener('change', exibirResultados);

    // Inicia o processo carregando os bairros
    document.addEventListener('DOMContentLoaded', carregarBairros);
</script>

</body>
</html>
