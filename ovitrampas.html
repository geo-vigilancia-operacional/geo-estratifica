<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ovitrampas</title>
    <style>
        /* Estilos básicos (mantidos do seu projeto) */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-color: #1a1a2e;
            --primary-color: #00b4d8;
            --secondary-color: #89b4f0;
            --text-color: #e0e0e0;
            --card-bg: #21213e;
            --border-color: #3e4a61;
            --input-bg: #111122; /* Novo */
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            padding: 10px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 15px;
        }

        .box {
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
        }
        
        .box h1, .box h3 {
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 1.3em;
            font-weight: 700;
            color: var(--secondary-color);
            text-shadow: 0 0 3px var(--secondary-color);
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
        }

        /* Estilos do formulário e resultados */
        .select-bairro, .select-qt {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            background-color: var(--input-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
        }

        .oculto {
            display: none;
        }

        /* ESTILOS ADICIONADOS PARA A SELEÇÃO DE QUADRAS */
        .semana-item {
            display: block; /* Para que cada checkbox ocupe uma linha */
            margin-bottom: 8px;
            cursor: pointer;
            padding: 5px;
            border-radius: 5px;
            background-color: transparent; /* Fundo transparente para harmonia */
            transition: background-color 0.2s ease;
        }

        .semana-item:hover {
            background-color: rgba(255, 255, 255, 0.05); /* Escurece no hover */
        }
        
        .semana-item input[type="checkbox"] {
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            cursor: pointer;
            margin-right: 10px; /* Adiciona espaçamento entre o checkbox e o texto */
            vertical-align: middle;
        }

        /* Classes de alerta para a média de ovos */
        .alerta-alto {
            color: #ff4d4d; /* Vermelho forte */
            font-weight: bold;
        }
        
        .destaque-qt {
            color: #00b4d8; /* Cor de destaque */
            font-weight: bold;
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="box">
            <h1>Dados de Ovitrampas</h1>
            
            <label for="selecaoBairro">Selecione o Bairro:</label>
            <select id="selecaoBairro" class="select-bairro"></select>
            
            <label for="selecaoQt" id="labelQt" class="oculto">Selecione o QT:</label>
            <select id="selecaoQt" class="select-qt oculto"></select>

            <div id="resumo-container" class="oculto">
                <h3>Resumo do Bairro</h3>
                <div id="totalGeral" class="total-ovos"></div>
                <div id="maximoOvos"></div>
            </div>
            
            <div id="semanasContainer" class="oculto box">
                <label>Selecione a(s) Semana(s):</label>
                <div id="semanasLista"></div>
            </div>

            <div id="resultados-detalhados-container" class="oculto">
                <h3>Resultados</h3>
                <div id="resultados"></div>
            </div>
        </div>
    </div>

    <script>
        const urlDoJson = 'ACOMPANHAMENTO_OVITRAMPAS.json';
        const selecaoBairro = document.getElementById('selecaoBairro');
        const selecaoQt = document.getElementById('selecaoQt');
        const labelQt = document.getElementById('labelQt');
        const semanasContainer = document.getElementById('semanasContainer');
        const semanasLista = document.getElementById('semanasLista');
        const resumoContainer = document.getElementById('resumo-container');
        const totalGeralDiv = document.getElementById('totalGeral');
        const maximoOvosDiv = document.getElementById('maximoOvos');
        const resultadosDetalhadosContainer = document.getElementById('resultados-detalhados-container');
        const resultadosDiv = document.getElementById('resultados');
        
        let dadosCompletos = [];

        async function carregarBairros() {
            try {
                const response = await fetch(urlDoJson);
                dadosCompletos = await response.json();

                const bairrosUnicos = new Set();
                dadosCompletos.forEach(item => {
                    if (item['BAIRRO ']) {
                        bairrosUnicos.add(item['BAIRRO '].trim());
                    }
                });

                const defaultOption = document.createElement('option');
                defaultOption.textContent = 'Selecione um bairro';
                defaultOption.value = '';
                selecaoBairro.appendChild(defaultOption);

                Array.from(bairrosUnicos).sort().forEach(bairro => {
                    const option = document.createElement('option');
                    option.textContent = bairro;
                    option.value = bairro;
                    selecaoBairro.appendChild(option);
                });

            } catch (error) {
                console.error('Erro ao buscar o JSON:', error);
                const option = document.createElement('option');
                option.textContent = 'Erro ao carregar dados';
                selecaoBairro.appendChild(option);
            }
        }
        
        function popularQts(bairroSelecionado) {
            selecaoQt.innerHTML = '';
            
            const dadosDoBairro = dadosCompletos.filter(item => 
                item['BAIRRO '].trim() === bairroSelecionado
            );

            if (dadosDoBairro.length === 0) return;

            const qtsUnicos = new Set();
            dadosDoBairro.forEach(item => {
                if (item['QT']) {
                    qtsUnicos.add(item['QT'].trim());
                }
            });

            const defaultOption = document.createElement('option');
            defaultOption.textContent = 'Todos os QT';
            defaultOption.value = '';
            selecaoQt.appendChild(defaultOption);
            
            Array.from(qtsUnicos).sort().forEach(qt => {
                const option = document.createElement('option');
                option.textContent = qt;
                option.value = qt;
                selecaoQt.appendChild(option);
            });

            labelQt.classList.remove('oculto');
            selecaoQt.classList.remove('oculto');
        }

        function popularSemanas(bairroSelecionado) {
            semanasLista.innerHTML = '';
            
            const dadosDoBairro = dadosCompletos.filter(item => 
                item['BAIRRO '].trim() === bairroSelecionado
            );

            if (dadosDoBairro.length === 0) return;

            const semanas = new Set();
            dadosDoBairro.forEach(item => {
                for (const key in item) {
                    if (key.startsWith('SEMANA ')) {
                        semanas.add(key.replace('SEMANA ', ''));
                    }
                }
            });

            Array.from(semanas).sort((a, b) => parseInt(a) - parseInt(b)).forEach(semana => {
                const label = document.createElement('label');
                label.className = 'semana-item';
                
                let somaOvosSemana = 0;
                dadosDoBairro.forEach(item => {
                    const valor = parseInt(item[`SEMANA ${semana}`]) || 0;
                    somaOvosSemana += valor;
                });

                label.innerHTML = `<input type="checkbox" name="semanas" value="${semana}"> Semana ${semana}: ${somaOvosSemana} ovos`;
                semanasLista.appendChild(label);
            });
        }
        
        function exibirResumoDoBairro(bairroSelecionado) {
            resumoContainer.classList.add('oculto');
            totalGeralDiv.innerHTML = '';
            maximoOvosDiv.innerHTML = '';
            
            const dadosDoBairro = dadosCompletos.filter(item => 
                item['BAIRRO '].trim() === bairroSelecionado
            );

            if (dadosDoBairro.length === 0) {
                resultadosDetalhadosContainer.classList.add('oculto');
                return;
            }

            let somaOvosTotal = 0;
            let maxOvos = 0;
            let maxSemana = '';
            let maxQt = '';
            
            dadosDoBairro.forEach(item => {
                for (const key in item) {
                    if (key.startsWith('SEMANA ')) {
                        const valor = parseInt(item[key]) || 0;
                        somaOvosTotal += valor;
                        if (valor > maxOvos) {
                            maxOvos = valor;
                            maxSemana = key.replace('SEMANA ', '');
                            maxQt = item['QT'];
                        }
                    }
                }
            });

            resumoContainer.classList.remove('oculto');
            resultadosDetalhadosContainer.classList.remove('oculto');
            totalGeralDiv.innerHTML = `Total Geral do Bairro: ${somaOvosTotal} ovos`;
            
            if (maxOvos > 0) {
                maximoOvosDiv.innerHTML = `Maior valor encontrado: <span class="destaque-qt">${maxOvos} ovos</span> na <br> Semana: <span class="destaque-qt">${maxSemana}</span> - QT: <span class="destaque-qt">${maxQt}</span>`;
            } else {
                maximoOvosDiv.innerHTML = `Não há registros de ovos neste bairro.`;
            }
        }
        
        function exibirDetalhesSemanas() {
            resultadosDiv.innerHTML = '';

            const bairroSelecionado = selecaoBairro.value;
            const qtSelecionado = selecaoQt.value;
            const semanasSelecionadas = Array.from(document.querySelectorAll('#semanasLista input[type="checkbox"]:checked'));
            
            if (semanasSelecionadas.length === 0) {
                return;
            }
            
            let dadosFiltrados = dadosCompletos.filter(item => 
                item['BAIRRO '].trim() === bairroSelecionado
            );

            if (qtSelecionado) {
                dadosFiltrados = dadosFiltrados.filter(item => item['QT'].trim() === qtSelecionado);
            }
            
            let somaTotalSemanasSelecionadas = 0;
            
            semanasSelecionadas.forEach(checkbox => {
                const semanaNumero = checkbox.value;
                const chaveSemana = `SEMANA ${semanaNumero}`;
                
                let somaOvosSemana = 0;
                const qtsComOvos = [];

                dadosFiltrados.forEach(item => {
                    const valor = parseInt(item[chaveSemana]) || 0;
                    somaOvosSemana += valor;
                    if (valor > 0) {
                        qtsComOvos.push(item['QT']);
                    }
                });
                
                // Média de ovos
                const numArmadilhas = qtsComOvos.length;
                const mediaOvos = numArmadilhas > 0 ? (somaOvosSemana / numArmadilhas).toFixed(2) : 0;
                
                somaTotalSemanasSelecionadas += somaOvosSemana;

                const p = document.createElement('p');
                let qtTexto = '';

                if (qtsComOvos.length > 0) {
                    qtTexto = `QT(s): <span class="destaque-qt">${qtsComOvos.join(', ')}</span> - `;
                }
                
                // Aplica a classe de alerta
                const mediaClass = mediaOvos >= 100 ? 'alerta-alto' : '';

                p.innerHTML = `<strong>Semana ${semanaNumero}:</strong> ${qtTexto}${somaOvosSemana} ovos | Média: <span class="${mediaClass}">${mediaOvos}</span>`;
                resultadosDiv.appendChild(p);
            });

            const somaFinal = document.createElement('p');
            somaFinal.innerHTML = `<strong>Soma Total das Semanas Selecionadas: ${somaTotalSemanasSelecionadas} ovos</strong>`;
            somaFinal.style.fontWeight = 'bold';
            somaFinal.style.marginTop = '15px';
            somaFinal.style.fontSize = '1.1em';
            resultadosDiv.prepend(somaFinal);
        }
        
        // Eventos que escutam as mudanças
        selecaoBairro.addEventListener('change', (event) => {
            const bairroSelecionado = event.target.value;
            if (bairroSelecionado) {
                semanasContainer.classList.remove('oculto');
                popularQts(bairroSelecionado);
                popularSemanas(bairroSelecionado);
                exibirResumoDoBairro(bairroSelecionado);
            } else {
                semanasContainer.classList.add('oculto');
                resumoContainer.classList.add('oculto');
                resultadosDetalhadosContainer.classList.add('oculto');
                labelQt.classList.add('oculto');
                selecaoQt.classList.add('oculto');
            }
        });
        
        selecaoQt.addEventListener('change', exibirDetalhesSemanas);
        semanasLista.addEventListener('change', exibirDetalhesSemanas);

        document.addEventListener('DOMContentLoaded', carregarBairros);
    </script>
</body>
</html>
