<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dados de Ovitrampas</title>
    <link rel="stylesheet" href="caminho/para/seu/estilo.css">
    
<style>
/* Estilo para ter a mesma aparência da sua página principal */
:root {
    --bg-color: #1a1a2e;
    --text-color: #e0e0e0;
    --card-bg: #21213e;
    --border-color: #3e4a61;
}

body {
    font-family: sans-serif;
    background-color: var(--bg-color);
    color: var(--text-color);
    line-height: 1.6;
    padding: 10px;
}

.container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 15px;
}

.box {
    background: var(--card-bg);
    border-radius: 12px;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
    padding: 25px;
    margin-bottom: 20px;
    border: 1px solid var(--border-color);
}
</style>
</head>
<body>

    <div class="container">
        <div class="box">
            <h1>Bairros de Ovitrampas</h1>
            <p>Buscando e mapeando os bairros do arquivo JSON...</p>
            <ul id="lista-bairros"></ul>
        </div>
    </div>

    <script>
        const urlDoJson = 'ACOMPANHAMENTO_OVITRAMPAS.json';
        const listaBairros = document.getElementById('lista-bairros');

        async function mapearBairros() {
            try {
                const response = await fetch(urlDoJson);
                const dados = await response.json();

                const bairrosUnicos = new Set();
                dados.forEach(item => {
                    if (item['BAIRRO ']) {
                        bairrosUnicos.add(item['BAIRRO '].trim());
                    }
                });

                bairrosUnicos.forEach(bairro => {
                    const li = document.createElement('li');
                    li.textContent = bairro;
                    listaBairros.appendChild(li);
                });

            } catch (error) {
                console.error('Erro ao buscar o JSON:', error);
                listaBairros.innerHTML = '<li>Erro ao carregar os bairros.</li>';
            }
        }

        document.addEventListener('DOMContentLoaded', mapearBairros);
    </script>

</body>
</html>
